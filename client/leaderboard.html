<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>排行榜 - ATAR</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .lb-page { padding: 24px; max-width: 600px; margin: 0 auto; }
    .lb-page h1 { margin-bottom: 16px; }
    .lb-mode { margin-bottom: 16px; }
    .lb-mode select { padding: 8px 12px; background: #0f0f23; color: #eee; border: 1px solid #444; border-radius: 6px; }
    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table th, .lb-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #333; }
    .lb-table th { color: #78c4ff; }
    .lb-table tr:hover { background: rgba(255,255,255,0.05); }
    .back { display: inline-block; margin-bottom: 16px; color: #78c4ff; }
    .lang-switch { position: absolute; top: 12px; right: 12px; font-size: 0.85rem; }
    .lang-switch a { color: #78c4ff; margin: 0 4px; }
    .lang-switch a.active { color: #fff; }
  </style>
</head>
<body>
  <div class="lang-switch"><a id="lang-zh" href="#">中文</a><span>|</span><a id="lang-en" href="#">EN</a></div>
  <div class="lb-page">
    <a href="index.html" class="back" data-i18n="back_game">← 返回游戏</a>
    <h1 data-i18n="lb_title">ATAR 排行榜</h1>
    <div class="lb-mode">
      <label data-i18n="lb_mode">排行依据：</label>
      <select id="mode">
        <option value="best_ever" data-i18n="lb_best_ever">历史最高 ATAR</option>
        <option value="latest" data-i18n="lb_latest">最近存档</option>
        <option value="last_day" data-i18n="lb_best_day">当日最佳</option>
      </select>
    </div>
    <table class="lb-table">
      <thead><tr><th data-i18n="lb_rank">排名</th><th data-i18n="lb_user">用户</th><th>ATAR</th><th data-i18n="lb_date">日期</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>
  <script src="i18n.js"></script>
  <script src="api.js"></script>
  <script src="leaderboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      I18n.apply();
      document.getElementById('lang-zh').onclick = function (e) { e.preventDefault(); I18n.setLang('zh'); I18n.apply(); document.getElementById('lang-zh').classList.add('active'); document.getElementById('lang-en').classList.remove('active'); };
      document.getElementById('lang-en').onclick = function (e) { e.preventDefault(); I18n.setLang('en'); I18n.apply(); document.getElementById('lang-en').classList.add('active'); document.getElementById('lang-zh').classList.remove('active'); };
      if (I18n.getLang() === 'en') document.getElementById('lang-en').classList.add('active'); else document.getElementById('lang-zh').classList.add('active');
    });
  </script>
</body>
</html>
