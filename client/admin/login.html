<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>管理后台登录 - ATAR</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body class="admin-login-page">
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <h1 class="admin-login-title">ATAR 管理后台</h1>
      <p class="admin-login-desc">仅限管理员登录，与游戏账号分离</p>
      <input type="text" id="username" placeholder="管理员用户名" autocomplete="username"/>
      <input type="password" id="password" placeholder="密码" autocomplete="current-password"/>
      <div id="error" class="error" style="display:none;"></div>
      <button id="btn-login">登录</button>
      <a href="../index.html" class="back">← 返回游戏</a>
    </div>
  </div>
  <script src="admin.js"></script>
  <script>
    document.getElementById('btn-login').onclick = function () {
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value;
      var err = document.getElementById('error');
      err.style.display = 'none';
      if (!u || !p) { err.textContent = '请输入用户名和密码'; err.style.display = 'block'; return; }
      fetch('/api/admin/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: u, password: p })
      })
        .then(function (r) {
          return r.json().then(function (data) {
            if (!r.ok) throw new Error(data.error || '登录失败');
            if (data.user && data.user.role === 'admin') {
              window.location.href = 'index.html';
            } else {
              err.textContent = '需要管理员账号';
              err.style.display = 'block';
            }
          });
        })
        .catch(function (e) {
          err.textContent = e.message || '登录失败';
          err.style.display = 'block';
        });
    };
  </script>
</body>
</html>
