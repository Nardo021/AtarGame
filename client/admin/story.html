<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>剧情管理 - Admin</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
  <div class="admin-wrap">
    <div class="nav">
      <a href="index.html">用户</a>
      <a href="story.html">剧情</a>
      <a href="config.html">配置</a>
      <a href="audit.html">审计</a>
      <a href="broadcast.html">广播</a>
      <a href="analytics.html">分析</a>
      <a href="#" class="logout" id="logout">退出</a>
    </div>
    <h1>剧情热更新</h1>
    <div id="msg"></div>
    <div class="form-group">
      <label>story_json（节点与选项）</label>
      <textarea id="story-json" class="json-editor" placeholder='{"nodes": {...}}'></textarea>
      <p class="json-hint">合法 JSON，保存前会校验；可用「格式化」整理</p>
    </div>
    <div class="form-actions">
      <button id="btn-prettify" class="secondary">格式化</button>
      <button id="btn-save" class="primary">保存新版本</button>
    </div>
    <div class="form-group" style="margin-top:24px;">
      <label>备注（可选）</label>
      <input type="text" id="story-note" placeholder="本次修改说明"/>
    </div>
    <h3>版本历史</h3>
    <table id="version-list">
      <thead><tr><th>ID</th><th>时间</th><th>备注</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <script src="admin.js"></script>
  <script>
    function showMsg(text, isError) {
      var el = document.getElementById('msg');
      el.className = 'msg ' + (isError ? 'error' : 'success');
      el.textContent = text;
      el.style.display = 'block';
    }

    function loadStory() {
      AdminAPI.api('/api/admin/story').then(function (data) {
        document.getElementById('story-json').value = data.story_json || '{"nodes":{}}';
        var tbody = document.querySelector('#version-list tbody');
        tbody.innerHTML = '';
        (data.versions || []).forEach(function (v) {
          var tr = document.createElement('tr');
          tr.innerHTML = '<td>' + v.id + '</td><td>' + (v.ts || '') + '</td><td>' + (v.note || '') + '</td><td><button data-id="' + v.id + '" class="btn-rollback">回滚</button></td>';
          tr.querySelector('.btn-rollback').onclick = function () {
            if (!confirm('回滚到版本 ' + v.id + '？')) return;
            AdminAPI.api('/api/admin/story/rollback/' + v.id, 'POST').then(function () {
              showMsg('已回滚');
              loadStory();
            }).catch(function (e) { showMsg(e.message, true); });
          };
          tbody.appendChild(tr);
        });
      }).catch(function () {});
    }

    document.getElementById('btn-prettify').onclick = function () {
      var el = document.getElementById('story-json');
      var v = AdminAPI.jsonValidate(el.value);
      if (!v.ok) { showMsg('JSON 无效: ' + v.message, true); return; }
      el.value = AdminAPI.jsonPrettify(el.value);
      el.classList.remove('invalid');
    };

    document.getElementById('btn-save').onclick = function () {
      var raw = document.getElementById('story-json').value.trim();
      var v = AdminAPI.jsonValidate(raw);
      if (!v.ok) { showMsg('JSON 无效: ' + v.message, true); document.getElementById('story-json').classList.add('invalid'); return; }
      document.getElementById('story-json').classList.remove('invalid');
      var note = document.getElementById('story-note').value.trim();
      AdminAPI.api('/api/admin/story', 'PUT', { story_json: raw, note: note || null }).then(function () {
        showMsg('已保存新版本');
        loadStory();
      }).catch(function (e) { showMsg(e.message, true); });
    };

    document.getElementById('logout').onclick = function () {
      AdminAPI.api('/api/admin/logout', 'POST').then(function () { window.location.href = 'login.html'; });
    };

    AdminAPI.checkAdmin().then(loadStory);
  </script>
</body>
</html>
