<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>广播 - Admin</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
  <div class="admin-wrap">
    <div class="nav">
      <a href="index.html">用户</a>
      <a href="story.html">剧情</a>
      <a href="config.html">配置</a>
      <a href="audit.html">审计</a>
      <a href="broadcast.html">广播</a>
      <a href="analytics.html">分析</a>
      <a href="#" class="logout" id="logout">退出</a>
    </div>
    <h1>全局广播</h1>
    <div id="msg"></div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="broadcast-title" placeholder="标题" required/>
    </div>
    <div class="form-group">
      <label>内容</label>
      <textarea id="broadcast-body" placeholder="正文"></textarea>
    </div>
    <div class="form-group">
      <label>过期时间（可选，ISO 或留空永久）</label>
      <input type="text" id="broadcast-expires" placeholder="例如 2026-12-31T23:59:59"/>
    </div>
    <button id="btn-broadcast" class="primary">发布</button>
  </div>
  <script src="admin.js"></script>
  <script>
    function showMsg(text, isError) {
      var el = document.getElementById('msg');
      el.className = 'msg ' + (isError ? 'error' : 'success');
      el.textContent = text;
      el.style.display = 'block';
    }
    document.getElementById('btn-broadcast').onclick = function () {
      var title = document.getElementById('broadcast-title').value.trim();
      var body = document.getElementById('broadcast-body').value.trim();
      var expires = document.getElementById('broadcast-expires').value.trim() || null;
      if (!title) { showMsg('请输入标题', true); return; }
      AdminAPI.api('/api/admin/broadcast', 'POST', { title: title, body: body, expires_at: expires }).then(function () {
        showMsg('已发布');
      }).catch(function (e) { showMsg(e.message, true); });
    };
    document.getElementById('logout').onclick = function () {
      AdminAPI.api('/api/admin/logout', 'POST').then(function () { window.location.href = 'login.html'; });
    };
    AdminAPI.checkAdmin();
  </script>
</body>
</html>
