<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>运营分析 - Admin</title>
  <link rel="stylesheet" href="admin.css"/>
  <style>
    .chart-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; margin: 12px 0; }
    .chart-box h4 { margin: 0 0 8px 0; font-size: 0.95rem; }
    .chart-box svg { width: 100%; height: 220px; display: block; }
    .heat-table { font-size: 0.8rem; }
    .heat-table th, .heat-table td { padding: 6px 8px; min-width: 50px; }
    .analytics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="nav">
      <a href="index.html">用户</a>
      <a href="story.html">剧情</a>
      <a href="config.html">配置</a>
      <a href="audit.html">审计</a>
      <a href="broadcast.html">广播</a>
      <a href="analytics.html">分析</a>
      <a href="#" class="logout" id="logout">退出</a>
    </div>
    <h1>运营分析</h1>
    <div class="toolbar">
      <label>时间范围（可选）</label>
      <input type="date" id="range-from"/>
      <input type="date" id="range-to"/>
      <button id="btn-refresh" class="primary">刷新</button>
    </div>
    <div class="analytics-grid">
      <div class="chart-box">
        <h4>留存 D1/D7/D30</h4>
        <svg id="chart-retention"></svg>
      </div>
      <div class="chart-box">
        <h4>结局分布</h4>
        <svg id="chart-endings"></svg>
      </div>
      <div class="chart-box">
        <h4>活跃时段（按小时）</h4>
        <svg id="chart-activity-hour"></svg>
      </div>
      <div class="chart-box">
        <h4>事件 Top</h4>
        <svg id="chart-events"></svg>
      </div>
      <div class="chart-box">
        <h4>行为热力图（地点 × 行为类型）</h4>
        <div id="chart-heatmap"></div>
      </div>
      <div class="chart-box">
        <h4>节点流（node_id）</h4>
        <svg id="chart-nodeflow"></svg>
      </div>
      <div class="chart-box">
        <h4>行为漏斗</h4>
        <div id="chart-funnel"></div>
      </div>
      <div class="chart-box">
        <h4>劝退点（强制事件后 3 天未活跃）</h4>
        <div id="chart-churn"></div>
      </div>
      <div class="chart-box">
        <h4>A/B 组对比（atar 均值、留存、结局分布）</h4>
        <div id="chart-ab"></div>
      </div>
    </div>
  </div>
  <script src="admin.js"></script>
  <script src="analytics.js"></script>
  <script>
    document.getElementById('btn-refresh').onclick = function () { AnalyticsCharts.loadAll(); };
    document.getElementById('logout').onclick = function () {
      AdminAPI.api('/api/admin/logout', 'POST').then(function () { window.location.href = 'login.html'; });
    };
    AdminAPI.checkAdmin().then(function () {
      var today = new Date().toISOString().slice(0, 10);
      var monthAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      if (!document.getElementById('range-from').value) document.getElementById('range-from').value = monthAgo;
      if (!document.getElementById('range-to').value) document.getElementById('range-to').value = today;
      AnalyticsCharts.loadAll();
    });
  </script>
</body>
</html>
