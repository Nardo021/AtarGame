<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Only Math</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Transition overlay -->
    <div id="transition-overlay" class="transition-overlay"></div>

    <!-- Main Menu -->
    <div id="screen-menu" class="screen active">
      <div id="menu-bg" class="menu-bg"></div>
      <div class="menu-overlay"></div>
      <div class="menu-content">
        <h1 class="menu-title">Only Math</h1>
        <p class="menu-subtitle">数学是你唯一的出口</p>
        <div class="menu-buttons">
          <button class="menu-btn" id="btn-new-game">新游戏</button>
          <button class="menu-btn" id="btn-continue" style="display:none">继续</button>
          <button class="menu-btn" id="btn-load">读档</button>
          <button class="menu-btn" id="btn-settings-menu">设置</button>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div id="screen-settings" class="screen">
      <div class="settings-panel">
        <h2>设置</h2>
        <div class="setting-row">
          <label>BGM 音量</label>
          <input type="range" id="set-bgm" min="0" max="100" value="50">
          <span id="set-bgm-val">50%</span>
        </div>
        <div class="setting-row">
          <label>SFX 音量</label>
          <input type="range" id="set-sfx" min="0" max="100" value="70">
          <span id="set-sfx-val">70%</span>
        </div>
        <div class="setting-row">
          <label>文字速度</label>
          <input type="range" id="set-textspeed" min="10" max="100" value="40">
          <span id="set-textspeed-val">40ms</span>
        </div>
        <div class="setting-row">
          <button class="btn-secondary" id="btn-settings-back">返回</button>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
      <div id="game-bg" class="game-bg"></div>
      <div id="char-layer" class="char-layer">
        <img id="char-left" class="char-sprite" alt="" style="display:none">
      </div>
      <div id="effect-overlay" class="effect-overlay"></div>

      <!-- HUD -->
      <div id="hud" class="hud">
        <div class="hud-date" id="hud-date">1月1日 周四</div>
        <div class="hud-slot" id="hud-slot">上午课</div>
        <div class="hud-stats">
          <div class="hud-stat">
            <span class="stat-label">ATAR</span>
            <div class="stat-bar"><div class="stat-fill stat-atar" id="bar-atar"></div></div>
            <span class="stat-val" id="val-atar">50</span>
          </div>
          <div class="hud-stat">
            <span class="stat-label">心情</span>
            <div class="stat-bar"><div class="stat-fill stat-mood" id="bar-mood"></div></div>
            <span class="stat-val" id="val-mood">70</span>
          </div>
          <div class="hud-stat">
            <span class="stat-label">健康</span>
            <div class="stat-bar"><div class="stat-fill stat-health" id="bar-health"></div></div>
            <span class="stat-val" id="val-health">80</span>
          </div>
        </div>
        <div class="hud-actions">
          <button class="hud-btn" id="btn-save-game" title="保存">💾</button>
          <button class="hud-btn" id="btn-settings-game" title="设置">⚙️</button>
          <button class="hud-btn" id="btn-menu-game" title="菜单">☰</button>
        </div>
      </div>

      <!-- Dialogue Box -->
      <div id="dialogue-box" class="dialogue-box" style="display:none">
        <div id="nameplate" class="nameplate"></div>
        <div id="dialogue-text" class="dialogue-text"></div>
        <div id="dialogue-indicator" class="dialogue-indicator">▼</div>
      </div>

      <!-- Choices -->
      <div id="choices-container" class="choices-container" style="display:none"></div>

      <!-- Map Overlay -->
      <div id="map-overlay" class="map-overlay" style="display:none">
        <div class="map-title">选择目的地</div>
        <div class="map-nodes" id="map-nodes"></div>
      </div>

      <!-- Action Panel -->
      <div id="action-panel" class="action-panel" style="display:none">
        <div class="action-panel-title">选择行动</div>
        <div id="action-buttons" class="action-buttons"></div>
      </div>
    </div>

    <!-- Save/Load Screen -->
    <div id="screen-save" class="screen">
      <div class="save-panel">
        <h2 id="save-title">存档</h2>
        <div id="save-slots" class="save-slots"></div>
        <button class="btn-secondary" id="btn-save-back">返回</button>
      </div>
    </div>

    <!-- Ending Screen -->
    <div id="screen-ending" class="screen">
      <div class="ending-content">
        <h1 id="ending-name" class="ending-name"></h1>
        <p id="ending-text" class="ending-text"></p>
        <div id="ending-atar" class="ending-atar"></div>
        <button class="menu-btn" id="btn-ending-menu">返回主菜单</button>
      </div>
    </div>

    <!-- Login Screen -->
    <div id="screen-login" class="screen">
      <div class="login-panel">
        <h2>登录 / 注册</h2>
        <div class="login-form">
          <input type="text" id="login-username" placeholder="用户名" autocomplete="username">
          <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
          <div class="login-buttons">
            <button class="menu-btn" id="btn-login">登录</button>
            <button class="btn-secondary" id="btn-register">注册</button>
          </div>
          <label class="login-remember">
            <input type="checkbox" id="login-remember" checked> 记住我
          </label>
          <div id="login-error" class="login-error"></div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none"></div>
  </div>

  <!-- Scripts: core -->
  <script src="core/events.js"></script>
  <script src="core/state.js"></script>
  <script src="core/time.js"></script>
  <script src="core/transitions.js"></script>

  <!-- Scripts: api -->
  <script src="api.js"></script>

  <!-- Scripts: game logic -->
  <script src="game/engine.js"></script>
  <script src="game/rules.js"></script>
  <script src="game/scheduler.js"></script>
  <script src="game/actions.js"></script>

  <!-- Scripts: UI modules -->
  <script src="ui/media.js"></script>
  <script src="ui/dialogue.js"></script>
  <script src="ui/hud.js"></script>
  <script src="ui/mapOverlay.js"></script>
  <script src="ui/actionPanel.js"></script>
  <script src="ui/saveLoad.js"></script>
  <script src="ui/mainMenu.js"></script>
  <script src="ui/settings.js"></script>
  <script src="ui/gameScreen.js"></script>
  <script src="ui/app.js"></script>
</body>
</html>
